app = "intersection-studio"
primary_region = "ord"

[build]
  dockerfile = "Dockerfile"

[mounts]
  source = "hermes_studio_data"
  destination = "/opt/data"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-2x"
  memory = 2048
