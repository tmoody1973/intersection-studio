app = "intersection-studio"
primary_region = "ord"

[build]
  dockerfile = "Dockerfile"

[mounts]
  source = "hermes_studio_data"
  destination = "/opt/data"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 50
    soft_limit = 25

[[http_service.checks]]
  interval = "30s"
  timeout = "5s"
  grace_period = "10s"
  method = "GET"
  path = "/health"

[[vm]]
  size = "shared-cpu-4x"
  memory = 8192
